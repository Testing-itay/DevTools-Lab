version: "3.9"

services:
  python-api:
    build:
      context: .
      dockerfile: Dockerfile.python
    ports:
      - "8000:8000"
    depends_on:
      - mongo
      - redis
      - kafka
    networks:
      - devtools-network

  node-api:
    build:
      context: .
      dockerfile: Dockerfile.node
    ports:
      - "3000:3000"
    depends_on:
      - mongo
      - redis
      - kafka
    networks:
      - devtools-network

  go-service:
    build:
      context: .
      dockerfile: Dockerfile.go
    ports:
      - "8080:8080"
    depends_on:
      - mongo
      - redis
    networks:
      - devtools-network

  java-service:
    build:
      context: .
      dockerfile: Dockerfile.java
    ports:
      - "8081:8081"
    depends_on:
      - mongo
      - kafka
      - elasticsearch
      - rabbitmq
    networks:
      - devtools-network

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - devtools-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - devtools-network

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: devtools
      POSTGRES_USER: devtools
      POSTGRES_PASSWORD: devtools
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - devtools-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - devtools-network

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - devtools-network

  elasticsearch:
    image: elasticsearch:8.12.0
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - devtools-network

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - devtools-network

networks:
  devtools-network:
    driver: bridge

volumes:
  mongo-data:
  postgres-data:
  es-data:
  redis-data:
